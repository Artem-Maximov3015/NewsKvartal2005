name: Check Kvartal2005 News

on:
  schedule:
    # Запуск каждые 30 минут. Можно изменить частоту, см. README.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # позволяет запускать вручную из вкладки Actions

permissions:
  contents: write   # нужно, чтобы бот мог закоммитить обновлённое состояние

jobs:
  check-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_URL: ${{ secrets.NEWS_URL }}
        run: python bot/main.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_news.json
          git diff --cached --quiet || git commit -m "chore: update seen news state [skip ci]"
          git push
